<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>TISWA | Smart Community Finance</title>
  <!-- Tailwind CSS + Font Awesome + Google Fonts (Poppins) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      font-family: 'Poppins', system-ui, -apple-system, sans-serif;
    }
    body {
      background: #f0f4f0;
      padding-bottom: 80px;
    }
    /* Professional Green Theme - Islamic essence */
    :root {
      --primary-deep: #0f4c2a;
      --primary-soft: #1e6f3f;
      --primary-light: #e8f3e8;
      --accent-gold: #c9a03d;
      --card-radius: 28px;
    }
    .bg-mosque-gradient {
      background: linear-gradient(145deg, #0f4c2a 0%, #1b6b3c 100%);
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: var(--card-radius);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .glass-card:active {
      transform: scale(0.98);
    }
    .bottom-nav a.active {
      background: #0f4c2a;
      color: white;
      box-shadow: 0 6px 14px rgba(15, 76, 42, 0.25);
    }
    .bottom-nav i {
      font-size: 1.3rem;
    }
    .scrollable-table {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
    }
    .qr-elegant {
      background: linear-gradient(145deg, #ffffff, #f9fef9);
      border-radius: 32px;
      transition: all 0.2s;
    }
    .status-badge {
      background: #e9f7ef;
      color: #0f4c2a;
    }
    /* custom scroll */
    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #dce8dc;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: #0f4c2a;
      border-radius: 10px;
    }
    .animate-float {
      animation: softFade 0.3s ease-out;
    }
    @keyframes softFade {
      from { opacity: 0; transform: translateY(8px);}
      to { opacity: 1; transform: translateY(0);}
    }
    .dashboard-stat {
      transition: all 0.2s;
    }
    .dashboard-stat:hover {
      transform: translateY(-3px);
    }
  </style>
</head>
<body class="antialiased">

  <div id="app" class="max-w-lg mx-auto px-4 pt-6 pb-24 relative">
    <!-- DYNAMIC PAGE CONTAINER -->
    <div id="pageContent" class="animate-float"></div>
    
    <!-- BOTTOM NAVIGATION - PREMIUM MOBILE DESIGN -->
    <div class="fixed bottom-3 left-0 right-0 flex justify-center z-40">
      <div class="bg-white/90 backdrop-blur-xl rounded-3xl shadow-2xl border border-white/40 w-[calc(100%-2rem)] max-w-md mx-auto px-2 py-2">
        <div class="flex justify-around items-center bottom-nav">
          <button data-page="home" class="nav-btn flex flex-col items-center gap-1 px-3 py-1.5 rounded-2xl transition-all duration-200 text-gray-600"><i class="fas fa-home text-lg"></i><span class="text-[10px] font-medium">Home</span></button>
          <button data-page="members" class="nav-btn flex flex-col items-center gap-1 px-3 py-1.5 rounded-2xl text-gray-600"><i class="fas fa-users text-lg"></i><span class="text-[10px]">Members</span></button>
          <button data-page="payment" class="nav-btn flex flex-col items-center gap-1 px-3 py-1.5 rounded-2xl text-gray-600"><i class="fas fa-qrcode text-lg"></i><span class="text-[10px]">Pay</span></button>
          <button data-page="history" class="nav-btn flex flex-col items-center gap-1 px-3 py-1.5 rounded-2xl text-gray-600"><i class="fas fa-history text-lg"></i><span class="text-[10px]">History</span></button>
          <button data-page="sports" class="nav-btn flex flex-col items-center gap-1 px-3 py-1.5 rounded-2xl text-gray-600"><i class="fas fa-futbol text-lg"></i><span class="text-[10px]">Sports</span></button>
          <button data-page="expense" class="nav-btn flex flex-col items-center gap-1 px-3 py-1.5 rounded-2xl text-gray-600"><i class="fas fa-receipt text-lg"></i><span class="text-[10px]">Expense</span></button>
          <button data-page="dashboard" class="nav-btn flex flex-col items-center gap-1 px-3 py-1.5 rounded-2xl text-gray-600"><i class="fas fa-chart-line text-lg"></i><span class="text-[10px]">Balance</span></button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ------------------- STATE (with localStorage persistence) -------------------
    let members = [
      { name: "Asaruddeen", mobile: "+91 98765 43210", role: "Founder & Admin" },
      { name: "Udhay Kumar", mobile: "+91 9XXXXXXX", role: "General Secretary" },
      { name: "Rahman Ali", mobile: "+91 99887 66551", role: "Finance Head" },
      { name: "Fazil Mohammed", mobile: "+91 98765 01234", role: "Events Director" },
      { name: "Nabeel Ahmed", mobile: "+91 97654 32109", role: "Member" }
    ];

    let payments = [
      { name: "Asaruddeen", amount: 1250, date: "2026-04-14", status: "Success", ref: "TXN001" },
      { name: "Abdul Rahman", amount: 500, date: "2026-04-12", status: "Success", ref: "TXN002" },
      { name: "Udhay K", amount: 800, date: "2026-04-11", status: "Success", ref: "TXN003" },
      { name: "Riyas A", amount: 750, date: "2026-04-10", status: "Success", ref: "TXN004" },
      { name: "Shameer M", amount: 1200, date: "2026-04-08", status: "Success", ref: "TXN005" },
      { name: "Haneefa", amount: 2100, date: "2026-04-15", status: "Success", ref: "TXN006" }
    ];

    let expenses = [
      { item: "Professional Cricket Kit", amount: 3200, date: "2026-04-05", category: "Sports" },
      { item: "Stumps & Bails Set", amount: 850, date: "2026-04-06", category: "Sports" },
      { item: "Match Refreshments", amount: 1250, date: "2026-04-09", category: "Event" },
      { item: "Team Jerseys (8 pcs)", amount: 5400, date: "2026-04-11", category: "Apparel" },
      { item: "First Aid & Hydration", amount: 780, date: "2026-04-13", category: "Medical" }
    ];

    // helper functions
    function getTotalCollected() {
      return payments.reduce((sum, p) => sum + p.amount, 0);
    }
    function getTotalSpent() {
      return expenses.reduce((sum, e) => sum + e.amount, 0);
    }
    function getRemainingBalance() {
      return getTotalCollected() - getTotalSpent();
    }
    function formatDate(dateStr) {
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    }
    function formatCurrency(amount) {
      return '₹ ' + amount.toLocaleString('en-IN');
    }

    function getRecentActivity() {
      const recentPay = [...payments].sort((a,b)=> new Date(b.date) - new Date(a.date)).slice(0, 3);
      const recentExp = [...expenses].sort((a,b)=> new Date(b.date) - new Date(a.date)).slice(0, 2);
      let acts = [];
      recentPay.forEach(p => acts.push({ icon: "💰", text: `${p.name} contributed ${formatCurrency(p.amount)} on ${formatDate(p.date)}`, type: "pay" }));
      recentExp.forEach(e => acts.push({ icon: "🛒", text: `Purchased ${e.item} — ${formatCurrency(e.amount)}`, type: "exp" }));
      if(acts.length === 0) acts = [{ icon: "✨", text: "All financial activities appear here", type: "info" }];
      return acts;
    }

    // save & load
    function persistData() {
      localStorage.setItem('tiswa_members_pro', JSON.stringify(members));
      localStorage.setItem('tiswa_payments_pro', JSON.stringify(payments));
      localStorage.setItem('tiswa_expenses_pro', JSON.stringify(expenses));
    }
    function loadData() {
      const m = localStorage.getItem('tiswa_members_pro');
      const p = localStorage.getItem('tiswa_payments_pro');
      const e = localStorage.getItem('tiswa_expenses_pro');
      if(m) members = JSON.parse(m);
      if(p) payments = JSON.parse(p);
      if(e) expenses = JSON.parse(e);
    }

    // ----- RENDER PAGES (PROFESSIONAL + ATTRACTIVE) -----
    function renderHome() {
      const balance = getRemainingBalance();
      const today = new Date().toLocaleDateString('en-IN', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      const activities = getRecentActivity();
      return `
        <div class="space-y-5">
          <!-- LOGO SECTION: Green Background + White Mosque Icon -->
          <div class="glass-card p-5 flex items-center justify-between bg-white">
            <div class="flex items-center gap-4">
              <div class="bg-mosque-gradient w-16 h-16 rounded-2xl flex items-center justify-center shadow-lg">
                <i class="fas fa-mosque text-white text-3xl drop-shadow-sm"></i>
              </div>
              <div>
                <h1 class="text-2xl font-extrabold tracking-tight text-gray-800">TISWA</h1>
                <p class="text-xs text-green-700 font-medium -mt-0.5"></p>
              </div>
            </div>
            <div class="bg-green-100 px-3 py-1.5 rounded-full">
              <i class="fas fa-shield-alt text-green-700 text-xs"></i>
              <span class="text-[11px] font-semibold text-green-800 ml-1">Unity</span>
            </div>
          </div>
          <!-- intro card -->
          <div class="glass-card p-5 bg-white border-l-8 border-green-700">
            <p class="text-gray-600 text-sm leading-relaxed"><i class="fas fa-quote-left text-green-600 mr-2 opacity-70"></i>Serving community with integrity, transparency, and collective growth. Every contribution builds a stronger tomorrow.</p>
          </div>
          <!-- balance premium card -->
          <div class="bg-mosque-gradient rounded-3xl p-6 text-white shadow-xl">
            <div class="flex justify-between items-start">
              <div><p class="text-green-100 text-sm font-medium tracking-wide">TOTAL BALANCE</p><p class="text-4xl font-bold mt-1 tracking-tight">${formatCurrency(balance)}</p></div>
              <i class="fas fa-hand-holding-heart text-4xl text-white/30"></i>
            </div>
            <div class="mt-4 flex justify-between items-center text-green-100 text-xs"><span><i class="far fa-calendar-alt mr-1"></i> ${today}</span><span class="bg-white/20 px-2 py-0.5 rounded-full">Verified</span></div>
          </div>
          <!-- recent activity -->
          <div class="glass-card p-5 bg-white">
            <h2 class="font-bold text-gray-800 flex items-center gap-2 text-lg"><i class="fas fa-waveform text-green-700"></i> Recent Activity</h2>
            <div class="mt-3 space-y-3">
              ${activities.map(act => `<div class="flex items-center gap-3 p-2 rounded-xl bg-gray-50"><div class="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center">${act.icon}</div><p class="text-sm text-gray-700 flex-1">${act.text}</p></div>`).join('')}
            </div>
          </div>
        </div>
      `;
    }

    function renderMembers() {
      return `<div><div class="flex justify-between items-center mb-4"><h2 class="text-2xl font-bold text-gray-800"><i class="fas fa-users text-green-700 mr-2"></i>Leadership & Members</h2><span class="bg-green-100 text-green-800 text-xs px-3 py-1 rounded-full">${members.length} registered</span></div><div class="glass-card bg-white overflow-hidden p-1"><div class="scrollable-table"><table class="min-w-full text-sm"><thead class="bg-green-50 text-gray-700 text-xs font-semibold"><tr><th class="px-5 py-3">Member</th><th class="px-5 py-3">Mobile</th><th class="px-5 py-3">Role</th></tr></thead><tbody>${members.map(m => `<tr class="border-b border-gray-100 hover:bg-green-50/30 transition"><td class="px-5 py-3 font-semibold text-gray-800">${m.name}</td><td class="px-5 py-3 text-gray-500 text-xs">${m.mobile}</td><td class="px-5 py-3"><span class="bg-green-100 text-green-800 text-[11px] px-2 py-1 rounded-full">${m.role}</span></td></tr>`).join('')}</tbody></table></div></div><div class="mt-4 text-center text-gray-400 text-[11px]"><i class="fas fa-address-card"></i> Verified community directory</div></div>`;
    }

    function renderPayment() {
      const recentThree = [...payments].slice(-3).reverse();
      return `<div><h2 class="text-2xl font-bold text-gray-800 mb-3"><i class="fas fa-qrcode text-green-700 mr-2"></i>Quick Donation</h2><div class="glass-card bg-white p-6 text-center qr-elegant shadow-md"><div class="bg-white w-44 h-44 mx-auto rounded-2xl flex flex-col items-center justify-center border-2 border-green-200 shadow-inner"><i class="fas fa-mosque text-5xl text-green-800 opacity-70"></i><i class="fas fa-qrcode text-5xl text-green-700 mt-1"></i><p class="text-[10px] text-gray-500 mt-2">TISWA Official QR</p></div><div class="mt-5 text-left bg-green-50/50 p-4 rounded-2xl"><p class="font-bold text-green-800 flex items-center gap-2"><i class="fas fa-circle-info"></i> Payment Instructions</p><ul class="text-sm text-gray-700 space-y-1.5 mt-2 ml-1 list-disc list-inside"><li>Scan QR using any UPI app (GPay, PhonePe, Paytm)</li><li>UPI ID: <strong class="bg-white px-2 py-0.5 rounded">tiswa@icici</strong></li><li>Enter amount & mention your <strong>Full Name</strong></li><li>Payment reflects within 2 hours in history</li></ul></div></div><div class="mt-5 glass-card p-4 bg-white"><h3 class="font-semibold text-gray-800"><i class="fas fa-clock"></i> Latest Contributions</h3><div class="mt-2 space-y-2">${recentThree.map(p => `<div class="flex justify-between items-center p-2 border-b border-gray-100"><div><p class="font-medium">${p.name}</p><p class="text-[10px] text-gray-400">${formatDate(p.date)}</p></div><span class="text-green-700 font-bold">${formatCurrency(p.amount)}</span></div>`).join('')}</div></div></div>`;
    }

    function renderHistory() {
      const sorted = [...payments].sort((a,b)=> new Date(b.date)-new Date(a.date));
      return `<div><h2 class="text-2xl font-bold mb-4 text-gray-800"><i class="fas fa-receipt text-green-700 mr-2"></i>GPay Style Ledger</h2><div class="glass-card bg-white overflow-hidden rounded-3xl"><div class="scrollable-table"><table class="min-w-full"><thead class="bg-gray-100 text-gray-700 text-xs"><tr><th class="px-5 py-3">Name</th><th class="px-5 py-3">Amount</th><th class="px-5 py-3">Date</th><th class="px-5 py-3">Status</th></tr></thead><tbody>${sorted.map(p => `<tr class="border-b"><td class="px-5 py-3 font-medium">${p.name}</td><td class="px-5 py-3 font-semibold text-green-700">${formatCurrency(p.amount)}</td><td class="px-5 py-3 text-gray-500 text-xs">${formatDate(p.date)}</td><td class="px-5 py-3"><span class="bg-green-100 text-green-800 text-[11px] px-2 py-1 rounded-full"><i class="fas fa-check-circle"></i> ${p.status}</span></td></tr>`).join('')}</tbody></table></div></div><p class="text-center text-xs text-gray-400 mt-3"><i class="fas fa-shield"></i> All transactions verified & immutable</p></div>`;
    }

    function renderSports() {
      return `<div><h2 class="text-2xl font-bold text-gray-800 mb-2"><i class="fas fa-futbol text-green-700 mr-2"></i>Ramadan Cricket '26</h2><div class="glass-card bg-white p-5 rounded-3xl shadow"><div class="flex justify-between items-center border-b pb-3"><div><p class="text-gray-500 text-xs">CHAMPIONS</p><p class="text-2xl font-black text-green-800">🏆 Team A</p><p class="text-xs">Green Stallions</p></div><div class="text-right"><p class="text-gray-500 text-xs">RUNNERS-UP</p><p class="text-xl font-bold text-gray-700">Team B</p><p class="text-xs">United Warriors</p></div></div><div class="mt-4 grid grid-cols-2 gap-3 text-sm"><div class="bg-green-50 p-2 rounded-xl"><i class="fas fa-crown text-yellow-600"></i> <strong>Player of Series:</strong> Asaruddeen</div><div class="bg-green-50 p-2 rounded-xl"><i class="fas fa-chart-simple"></i> <strong>Most Wickets:</strong> Udhay (9 wkts)</div></div><div class="mt-4 p-3 bg-gray-50 rounded-xl flex items-center gap-3"><i class="fas fa-camera-retro text-green-700 text-xl"></i><span class="text-xs text-gray-600">📸 Action photos & award ceremony gallery will be uploaded after Eid celebration.</span></div></div></div>`;
    }

    function renderExpense() {
      const totalExp = getTotalSpent();
      return `<div><div class="flex justify-between items-center mb-3"><h2 class="text-2xl font-bold text-gray-800"><i class="fas fa-cart-shopping text-green-700 mr-2"></i>Expense Tracker</h2><span class="bg-red-100 text-red-700 px-3 py-1 rounded-full text-sm font-bold">${formatCurrency(totalExp)}</span></div><div class="glass-card bg-white overflow-hidden rounded-3xl mb-4"><div class="scrollable-table"><table class="min-w-full text-sm"><thead class="bg-gray-50"><tr><th class="px-5 py-3 text-left">Item</th><th class="px-5 py-3 text-left">Amount</th><th class="px-5 py-3 text-left">Date</th></tr></thead><tbody>${expenses.map(e => `<tr class="border-b"><td class="px-5 py-3 font-medium">${e.item}</td><td class="px-5 py-3 text-red-600 font-semibold">${formatCurrency(e.amount)}</td><td class="px-5 py-3 text-gray-500 text-xs">${formatDate(e.date)}</td></tr>`).join('')}</tbody></table></div></div><button id="demoExpenseBtn" class="w-full py-3 bg-green-600 hover:bg-green-700 text-white rounded-2xl flex items-center justify-center gap-2 transition shadow-md"><i class="fas fa-plus-circle"></i> Add Sample Expense (Demo)</button></div>`;
    }

    function renderDashboard() {
      const collected = getTotalCollected();
      const spent = getTotalSpent();
      const remaining = getRemainingBalance();
      const percentRemaining = collected ? (remaining / collected) * 100 : 0;
      return `<div><h2 class="text-2xl font-bold text-gray-800 mb-4"><i class="fas fa-chart-line text-green-700 mr-2"></i>Balance Dashboard</h2><div class="space-y-4"><div class="glass-card bg-white p-5 rounded-2xl dashboard-stat"><div class="flex justify-between"><div><p class="text-gray-500 text-sm">Total Collected</p><p class="text-3xl font-extrabold text-green-700">${formatCurrency(collected)}</p></div><i class="fas fa-hand-holding-usd text-4xl text-green-200"></i></div></div><div class="glass-card bg-white p-5 rounded-2xl dashboard-stat"><div class="flex justify-between"><div><p class="text-gray-500 text-sm">Total Spent</p><p class="text-3xl font-extrabold text-rose-600">${formatCurrency(spent)}</p></div><i class="fas fa-chart-simple text-4xl text-rose-200"></i></div></div><div class="bg-mosque-gradient rounded-2xl p-6 text-white shadow-xl"><p class="text-green-100 text-sm tracking-wide">REMAINING BALANCE</p><p class="text-4xl font-black mt-1">${formatCurrency(remaining)}</p><div class="w-full bg-green-900/40 rounded-full h-2 mt-4"><div class="bg-white h-2 rounded-full" style="width: ${percentRemaining}%"></div></div><div class="flex justify-between text-green-100 text-xs mt-3"><span>💰 Community Fund</span><span>⚡ ${Math.round(percentRemaining)}% reserve</span></div></div><div class="text-center text-[11px] text-gray-400 mt-2"><i class="far fa-clock"></i> Real-time financial integrity</div></div></div>`;
    }

    // Helper for expense demo + persistence
    let currentActive = 'home';
    function attachExpenseDemo() {
      const btn = document.getElementById('demoExpenseBtn');
      if(btn) {
        btn.onclick = () => {
          const newItem = { item: "Cricket Refreshments (Demo)", amount: 650, date: new Date().toISOString().slice(0,10), category: "Event" };
          expenses.push(newItem);
          persistData();
          if(currentActive === 'expense') renderPage('expense');
          else alert("✅ Demo expense added: ₹650 (Cricket Refreshments)");
        };
      }
    }

    function renderPage(page) {
      currentActive = page;
      const container = document.getElementById('pageContent');
      let html = '';
      if(page === 'home') html = renderHome();
      else if(page === 'members') html = renderMembers();
      else if(page === 'payment') html = renderPayment();
      else if(page === 'history') html = renderHistory();
      else if(page === 'sports') html = renderSports();
      else if(page === 'expense') html = renderExpense();
      else if(page === 'dashboard') html = renderDashboard();
      else html = renderHome();
      container.innerHTML = html;
      if(page === 'expense') setTimeout(attachExpenseDemo, 10);
      // update nav active styles
      document.querySelectorAll('.nav-btn').forEach(btn => {
        const pg = btn.getAttribute('data-page');
        if(pg === page) {
          btn.classList.add('active', 'bg-green-700', 'text-white');
          btn.classList.remove('text-gray-600', 'bg-transparent');
        } else {
          btn.classList.remove('active', 'bg-green-700', 'text-white');
          btn.classList.add('text-gray-600');
        }
      });
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function initNav() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const page = btn.getAttribute('data-page');
          if(page) renderPage(page);
        });
      });
    }

    loadData();
    renderPage('home');
    initNav();
    window.addEventListener('beforeunload', () => persistData());
    setInterval(persistData, 8000);
  </script>
</body>
</html>
